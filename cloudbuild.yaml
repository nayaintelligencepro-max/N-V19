steps:
  # ══════════════════════════════════════════════════════════════════════════
  # GATE 0 — Full test suite (496 tests) + Pre-Deploy Gate (2 real sales)
  # MANDATORY: No Cloud Run deployment without this gate passing.
  # cloud_run gate amounts: Vente 1 = 50 000 EUR | Vente 2 = 70 000 EUR
  # ══════════════════════════════════════════════════════════════════════════
  - name: 'python:3.11-slim'
    id: 'pre-deploy-gate'
    entrypoint: bash
    env:
      - 'DEPLOY_ENV=cloud_run'
      - 'PYTHONPATH=/workspace'
    secretEnv:
      - 'TELEGRAM_BOT_TOKEN'
      - 'TELEGRAM_CHAT_ID'
    args:
      - '-c'
      - |
        set -e
        echo "══════════════════════════════════════════════════════════"
        echo "  NAYA SUPREME V19 — PRE-DEPLOY GATE"
        echo "  Environment : cloud_run"
        echo "  Amounts     : Vente 1 = 50 000 EUR | Vente 2 = 70 000 EUR"
        echo "  Commit      : $COMMIT_SHA"
        echo "══════════════════════════════════════════════════════════"

        pip install -q pytest requests uvicorn fastapi httpx

        echo ""
        echo "Step 1/3 — Full test suite (496 tests)..."
        python -m pytest \
          tests/test_smoke.py \
          tests/test_evolution_system.py \
          tests/test_pain_hunt_engines.py \
          tests/test_reapers_security.py \
          tests/test_tiny_house_engines.py \
          tests/test_v20_intelligence.py \
          -q --tb=short --no-header 2>&1
        echo "✅ Full suite passed"

        echo ""
        echo "Step 2/3 — Starting NAYA API server for gate test..."
        uvicorn NAYA_CORE.api.main:app --host 127.0.0.1 --port 8765 \
          --log-level critical --no-access-log &
        SERVER_PID=$!
        sleep 5
        for i in $(seq 1 12); do
          if curl -sf http://127.0.0.1:8765/api/v1/health | grep -q healthy; then
            echo "✅ API server ready"
            break
          fi
          sleep 2
        done

        echo ""
        echo "Step 3/3 — Pre-Deploy Gate cloud_run (50k + 70k EUR = 120 000 EUR)..."
        BASE_URL=http://127.0.0.1:8765 DEPLOY_ENV=cloud_run \
          python -m pytest tests/test_pre_deploy_gate.py -v --tb=short 2>&1
        echo "✅ Gate cloud_run PASSED — 120 000 EUR validés — déploiement autorisé"

        kill $SERVER_PID 2>/dev/null || true

  # ── Build Docker image ──────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--no-cache'
      - '-t'
      - 'gcr.io/$PROJECT_ID/naya-supreme:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/naya-supreme:latest'
      - '.'

  # ── Push image to Container Registry ───────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/naya-supreme'

  # ── Deploy to Cloud Run ─────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'naya-supreme'
      - '--image=gcr.io/$PROJECT_ID/naya-supreme:$COMMIT_SHA'
      - '--platform=managed'
      - '--region=europe-west1'
      - '--allow-unauthenticated'
      - '--port=8000'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--concurrency=80'
      - '--timeout=300'
      - '--set-env-vars=ENVIRONMENT=production,NAYA_ENV=production,LOG_LEVEL=INFO'
      - '--set-env-vars=ENABLE_SELF_HEALING=true,ENABLE_GUARDIAN=true'
      - '--set-env-vars=NAYA_AUTO_OUTREACH=false,API_WORKERS=2'
      # Secrets Cloud Run — créez-les avec: gcloud secrets create SECRET_NAME
      - '--set-secrets=SECRET_KEY=naya-secret-key:latest'
      - '--set-secrets=ANTHROPIC_API_KEY=anthropic-api-key:latest'
      - '--set-secrets=TELEGRAM_BOT_TOKEN=telegram-bot-token:latest'
      - '--set-secrets=TELEGRAM_CHAT_ID=telegram-chat-id:latest'
      - '--set-secrets=STRIPE_API_KEY=stripe-api-key:latest'
      - '--set-secrets=STRIPE_WEBHOOK_SECRET=stripe-webhook-secret:latest'
      - '--set-secrets=SENDGRID_API_KEY=sendgrid-api-key:latest'
      - '--set-secrets=SERPER_API_KEY=serper-api-key:latest'

images:
  - 'gcr.io/$PROJECT_ID/naya-supreme:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/naya-supreme:latest'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/telegram-bot-token/versions/latest
      env: 'TELEGRAM_BOT_TOKEN'
    - versionName: projects/$PROJECT_ID/secrets/telegram-chat-id/versions/latest
      env: 'TELEGRAM_CHAT_ID'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
