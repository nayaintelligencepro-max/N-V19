version: "3.9"

services:
  # ===== NAYA V19 CORE =====
  naya:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: naya-v19-complete
    ports:
      - "${PORT:-8080}:8080"
      - "8000:8000"  # Metrics
    environment:
      - NAYA_ENV=docker
      - NAYA_VERSION=18.0.0
      - PORT=8080
      - LOG_LEVEL=INFO
      - JAEGER_AGENT_HOST=jaeger
      - JAEGER_AGENT_PORT=6831
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=postgresql://naya:naya_secure@postgres:5432/naya_v19
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672/
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_started
    volumes:
      - ./data:/app/data
      - ./SECRETS:/app/SECRETS:ro
      - ./logs:/app/logs
    networks:
      - naya-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===== DATABASE =====
  postgres:
    image: postgres:15-alpine
    container_name: naya-postgres
    environment:
      - POSTGRES_USER=naya
      - POSTGRES_PASSWORD=naya_secure
      - POSTGRES_DB=naya_v19
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - naya-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U naya"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== CACHE =====
  redis:
    image: redis:7-alpine
    container_name: naya-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - naya-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ===== MESSAGE BROKER =====
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: naya-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - naya-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== DISTRIBUTED TRACING =====
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: naya-jaeger
    ports:
      - "6831:6831/udp"
      - "16686:16686"
    networks:
      - naya-network
    restart: unless-stopped

  # ===== METRICS COLLECTION =====
  prometheus:
    image: prom/prometheus:latest
    container_name: naya-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - naya-network
    restart: unless-stopped
    depends_on:
      - naya

  # ===== VISUALIZATION =====
  grafana:
    image: grafana/grafana:latest
    container_name: naya-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - naya-network
    restart: unless-stopped
    depends_on:
      - prometheus

  # ===== ALERT MANAGEMENT =====
  alertmanager:
    image: prom/alertmanager:latest
    container_name: naya-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - naya-network
    restart: unless-stopped

  # ===== LOG AGGREGATION =====
  loki:
    image: grafana/loki:latest
    container_name: naya-loki
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yml
    networks:
      - naya-network
    restart: unless-stopped

  # ===== LOG SHIPPING =====
  promtail:
    image: grafana/promtail:latest
    container_name: naya-promtail
    volumes:
      - ./config/promtail.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - naya-network
    restart: unless-stopped

  # ===== DEVELOPMENT TOOLS =====
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: naya-pgadmin
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@naya.local
      - PGADMIN_DEFAULT_PASSWORD=admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - naya-network
    profiles:
      - dev
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: naya-redis-commander
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    networks:
      - naya-network
    profiles:
      - dev
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  loki_data:
  pgadmin_data:

networks:
  naya-network:
    driver: bridge
