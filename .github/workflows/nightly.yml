name: Nightly watchdog

on:
  schedule:
    - cron: "17 3 * * *"   # 03:17 UTC every day
  workflow_dispatch:

jobs:
  full-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit==1.7.10 pip-audit==2.7.3 safety==3.2.9

      - name: Bandit full scan
        run: bandit -r NAYA_CORE/ outreach/ config/ scripts/ -f json -o bandit.json || true

      - name: pip-audit full
        run: pip-audit --requirement requirements.txt --format json -o pip-audit.json || true

      - name: Safety (CVE DB)
        run: safety check --json --output safety.json || true

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: nightly-security-reports
          path: |
            bandit.json
            pip-audit.json
            safety.json
          retention-days: 30
